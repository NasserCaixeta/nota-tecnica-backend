services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nota_tecnica
      POSTGRES_USER: nota_tecnica
      POSTGRES_PASSWORD: nota_tecnica
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nota_tecnica -d nota_tecnica"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
